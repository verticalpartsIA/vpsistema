name: Deploy Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_SB_PROPOSTAS_URL: ${{ secrets.VITE_SB_PROPOSTAS_URL }}
      VITE_SB_PROPOSTAS_KEY: ${{ secrets.VITE_SB_PROPOSTAS_KEY }}
      VITE_SB_CLICK_URL: ${{ secrets.VITE_SB_CLICK_URL }}
      VITE_SB_CLICK_KEY: ${{ secrets.VITE_SB_CLICK_KEY }}
      VITE_SB_VISITAS_URL: ${{ secrets.VITE_SB_VISITAS_URL }}
      VITE_SB_VISITAS_KEY: ${{ secrets.VITE_SB_VISITAS_KEY }}
      VITE_SB_CATRACA_URL: ${{ secrets.VITE_SB_CATRACA_URL }}
      VITE_SB_CATRACA_KEY: ${{ secrets.VITE_SB_CATRACA_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

      # ── Deploy real via SSH (autenticação por senha) ────────────────────
      # A integração Git nativa do hPanel (Websites → Node.js → Git) parou de
      # funcionar após o rename do repositório para 001_vpsistema. Este passo
      # substitui aquela dependência: envia o build direto pro servidor via
      # SCP/SSH, sem depender de nenhuma reconexão manual no painel.
      #
      # Requer estes secrets no repositório (Settings → Secrets and variables
      # → Actions), obtidos em hPanel → Avançado → Acesso SSH para o site
      # vpsistema.com:
      #   HOSTINGER_SSH_HOST      ex: 76.13.95.90
      #   HOSTINGER_SSH_PORT      ex: 65002
      #   HOSTINGER_SSH_USER      ex: u969661049
      #   HOSTINGER_SSH_PASSWORD  senha de acesso SSH dessa conta
      #   HOSTINGER_REMOTE_PATH   caminho da app no servidor,
      #                           ex: /home/u969661049/domains/vpsistema.com/public_html
      #
      # Se algum desses secrets não estiver definido, este job é pulado (não
      # quebra o build) — assim o workflow continua útil como CI mesmo antes
      # de configurar o deploy.
      - name: Check deploy secrets are configured
        id: check_secrets
        run: |
          if [ -n "${{ secrets.HOSTINGER_SSH_HOST }}" ] && [ -n "${{ secrets.HOSTINGER_SSH_PASSWORD }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Secrets HOSTINGER_SSH_HOST/HOSTINGER_SSH_PASSWORD não configurados — pulando deploy. Veja instruções no arquivo do workflow."
          fi

      - name: Deploy dist/ via SCP (senha)
        if: steps.check_secrets.outputs.configured == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          source: "dist/*"
          target: ${{ secrets.HOSTINGER_REMOTE_PATH }}
          strip_components: 1
          overwrite: true

      - name: Restart Node.js app (Passenger)
        if: steps.check_secrets.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          script: |
            mkdir -p ${{ secrets.HOSTINGER_REMOTE_PATH }}/tmp
            touch ${{ secrets.HOSTINGER_REMOTE_PATH }}/tmp/restart.txt
